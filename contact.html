<body>
    <div class="form-container" id="formContainer">
        <h1>Contact</h1>
        <form id="profileForm" action="https://formspree.io/f/mzdanzwn" method="post">
            <div class="form-group">
                <label for="name">
                    Name
                    <span class="typing-indicator" id="nameTyping">Typing...</span>
                </label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">
                    Email
                    <span class="typing-indicator" id="emailTyping">Typing...</span>
                </label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="bio">
                    Tell me about your idea
                    <span class="typing-indicator" id="bioTyping">Typing...</span>
                </label>
                <textarea id="bio" name="bio" placeholder="Explain into further detail..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="spinner"></span>
                <span class="btn-text">Submit</span>
            </button>

            <div class="status-message" id="statusMessage"></div>
        </form>
    </div>

</body>
	
	<script src="js/contact.js"></script>
